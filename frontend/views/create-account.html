<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/img/logos/Nile Global refinery Logo 2-02.png">
<link rel="apple-touch-icon" href="/img/logos/Nile Global refinery Logo 2-02.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nile Global Refinery | Client Access</title>

<link rel="stylesheet" href="/css/create-account.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="logo-area">

<img src="/img/logos/Nile Global refinery Logo 2-01.png" alt="Nile Global Refinery Logo" class="logo">

<h1>Nile Global Refinery</h1>

<p>Client Access Portal</p>

</div>

<div class="tabs">

<button class="tab active" onclick="showForm('login')">Sign In</button>
<button class="tab" onclick="showForm('signup')">Create Account</button>

</div>

<!-- SIGN IN -->

<form id="loginForm" class="form">

<input id="loginEmail" type="email" placeholder="Email Address" required>

<input id="loginPassword" type="password" placeholder="Password" required>

<button type="button" class="primary-btn" onclick="login()">Sign In</button>

</form>

<!-- SIGN UP -->

<form id="signupForm" class="form hidden">

<input id="fullName" type="text" placeholder="Full Name" required>

<input id="signupEmail" type="email" placeholder="Email Address" required>

<input id="signupPassword" type="password" placeholder="Password" required>

<button type="button" class="primary-btn" onclick="signup()">Create Account</button>

</form>

<div id="passwordStrength"></div>
<div class="divider">
<span>or continue with</span>
</div>

<div class="social-logins">

<button class="social-btn google" onclick="googleLogin()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
</button>

<button class="social-btn linkedin">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg">
</button>

<button class="social-btn facebook" onclick="facebookLogin()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">
</button>

</div>

</div>

</div>

<script src="/js/create-account.js"></script>

</body>
</html>
